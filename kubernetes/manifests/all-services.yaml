---
# --- FRONTEND SERVICE ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-service
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      imagePullSecrets: # <-- Parfaitement placé ici aussi
      - name: harbor-registry-secret
      containers:
      - name: frontend-container
        image: 192.168.56.11:30002/library/frontend:v1
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000 # <-- Ton vrai TargetPort
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: default
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 3000
      nodePort: 30984 # <-- Ton NodePort d'origine (44 jours d'âge) exporatiation stable