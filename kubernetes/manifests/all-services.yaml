# --- AUTH SERVICE ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: default
spec:
  replicas: 2 # Gardé à 2 comme dans ton fichier initial
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      imagePullSecrets: # <-- Parfaitement placé dans la spec du Pod
      - name: harbor-registry-secret
      containers:
      - name: auth-container
        image: 192.168.56.11:30002/library/auth:v1
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000 # <-- Ton vrai TargetPort
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
        startupProbe:
          httpGet:
            path: /
            port: 3000
          failureThreshold: 30
          periodSeconds: 5
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: default
spec:
  selector:
    app: auth
  ports:
    - protocol: TCP
      port: 80 # <-- Ton port de service externe
      targetPort: 3000
  type: ClusterIP

---
# --- BACKEND SERVICE ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-service
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      imagePullSecrets: # <-- Parfaitement placé ici aussi
      - name: harbor-registry-secret
      containers:
      - name: backend-container
        image: 192.168.56.11:30002/library/backend:v1
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000 # <-- Ton vrai TargetPort
        resources:
          limits:
            memory: "256Mi"
            cpu: "500m"
---
